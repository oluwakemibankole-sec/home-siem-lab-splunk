[Brute Force Login Attempt Detection]
search = index=windows sourcetype="WinEventLog:Security" EventCode=4625 | stats count by Account_Name, Source_Network_Address | where count >= 5
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 5
alert.track = 1

[Suspicious PowerShell Activity Detection]
search = index=windows sourcetype="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" (Image="*powershell.exe*" OR CommandLine="*EncodedCommand*" OR CommandLine="*-enc*")
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 4
alert.track = 1
